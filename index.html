<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Target Tracker</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <main class ="calculator">
        <header class ="calcolator-header">
            <h1>Investment Target Tracker</h1>
            <p>Track your investment targets and monitor your progress towards achieving your financial goals.</p>
        </header>
        <div class = "calculator--grids">
            <section class = "calculator__inputs">
                <form id="investment-form">
                    <div class="input-group">
                        <label for="initial-investment">Initial Investment (€):</label>
                        <input type="number" id="initial-investment" value="0" min ="0">
                    </div>
                    <div class="input-group">
                        <label for="monthly-step">Monthly Step (€):</label>
                        <input type="number" id="monthly-step" value="0" min ="0">
                    </div>
                    <div class="input-group">
                        <label for="years">Investment term (years):</label>
                        <input type="number" id="years" value="10" min ="0">
                    </div>
                    <div class="input-group">
                        <label for="rate">Annual Rate (%):</label>
                        <input type="number" id="rate" value="10" min ="0" step="0.01">
                    </div>
                </form>
            </section>
            <section class = "calculator__results">
                
                <div id="result-card">
                    <h2>Results</h2>
                    
                </div>
                <div id="chart-container">
                    <p id="final-result" class="result-card__value">€ 0.00</p>
                    <canvas id="investment-chart"></canvas>
                </div>
            </section>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="/js/main.js"></script>
    </main>
</body>
</html>
